services:
  backend:
    build: ./backend
    ports:
      - "26032:26032"
    environment:
      - PORT=26032
      - NODE_ENV=production
      - FRONTEND_URL=http://frontend:26032
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_BACKEND_URL=${NEXT_PUBLIC_BACKEND_URL:-}
    expose:
      - "26032"
    environment:
      - PORT=26032
      - HOSTNAME=0.0.0.0
    depends_on:
      - backend
    restart: unless-stopped
