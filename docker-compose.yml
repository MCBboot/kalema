services:
  backend:
    build: ./backend
    ports:
      - "26033:26033"
    environment:
      - PORT=26033
      - NODE_ENV=production
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_SOCKET_URL=${NEXT_PUBLIC_SOCKET_URL:-}
    ports:
      - "26032:26032"
    environment:
      - PORT=26032
      - HOSTNAME=0.0.0.0
    depends_on:
      - backend
    restart: unless-stopped
